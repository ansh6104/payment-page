<!DOCTYPE html>
<html>
<head>
    <title>IJERT Conference Payment</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            width: 320px;
        }

        .logo {
            width: 80px;
            margin-bottom: 10px;
        }

        h1 {
            margin-bottom: 10px;
            color: #333;
        }

        p {
            color: #777;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 12px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
            transition: 0.3s;
        }

        input:focus {
            border-color: #4facfe;
            outline: none;
            box-shadow: 0 0 5px rgba(79,172,254,0.5);
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 15px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #4facfe, #00c6ff);
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
    </style>
</head>

<body>

<div class="container">

    <!-- LOGO -->
    <img src="logo.png" alt="IJERT Logo" class="logo">

    <h1>IJERT Conference</h1>
    <p>Complete your paper submission payment</p>

    <input type="text" id="name" placeholder="Name of Applicant">
    <input type="text" id="paper" placeholder="Title of Paper">

    <button onclick="payNow()">Proceed to Payment</button>
</div>

<script>
function payNow() {
    var name = document.getElementById("name").value;
    var paper = document.getElementById("paper").value;

    if(name === "" || paper === "") {
        alert("Please fill all fields");
        return;
    }

    var baseLink = "https://rzp.io/rzp/SuHU9rs";

    var finalLink = baseLink + "?name=" + encodeURIComponent(name) + 
                              "&paper=" + encodeURIComponent(paper);

    window.location.href = finalLink;
}
</script>

</body>
</html>
