<!DOCTYPE html>
<html>
<head>
    <title>Conference Payment</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
            background-color: #f5f5f5;
        }
        input {
            padding: 10px;
            margin: 10px;
            width: 250px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        button {
            padding: 15px 35px;
            font-size: 18px;
            background-color: #3399cc;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 8px;
            margin-top: 20px;
        }
        button:hover {
            background-color: #287aa9;
        }
    </style>
</head>

<body>

<h2>Conference Payment</h2>

<input type="text" id="name" placeholder="Name of Applicant"><br>
<input type="text" id="paper" placeholder="Title of Paper"><br>

<button onclick="payNow()">Proceed to Payment</button>

<script>
function payNow() {
    var name = document.getElementById("name").value;
    var paper = document.getElementById("paper").value;

    if(name === "" || paper === "") {
        alert("Please fill all fields");
        return;
    }

    // 🔴 Replace with your Razorpay Payment Link
    var baseLink = "https://rzp.io/rzp/F657u0m";

    var finalLink = baseLink + "?name=" + encodeURIComponent(name) + 
                              "&paper=" + encodeURIComponent(paper);

    window.location.href = finalLink;
}
</script>

</body>
</html>
